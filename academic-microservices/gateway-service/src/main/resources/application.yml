server:
  port: 8076

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        register-enabled: true
        namespace: public
      config:
        import-check:
          enabled: false
    gateway:
      jwt:
        secret: ${JWT_SECRET:academic-jwt-secret-key-for-academic-warning-system-2026}
      discovery:
        locator:
          enabled: true
      default-filters:
        - name: RequestSize
          args:
            maxSize: 10MB
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "Content-Type,Authorization"
            allowCredentials: false
            maxAge: 3600
      routes:
        - id: college-service
          uri: lb://college-service
          predicates:
            - Path=/api/colleges/**
          filters:
            - StripPrefix=1
        - id: college-service-auth
          uri: lb://college-service
          predicates:
            - Path=/api/auth/colleges
          filters:
            - StripPrefix=2
            - RewritePath=/colleges, /colleges/all
        - id: major-service-auth
          uri: lb://college-service
          predicates:
            - Path=/api/auth/majors
          filters:
            - StripPrefix=2
            - RewritePath=/majors, /majors/all
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: auth-service-main
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/courses/**
          filters:
            - StripPrefix=1
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/roles/**,/api/permissions/**,/api/role-permissions/**
          filters:
            - StripPrefix=1
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/messages/**
          filters:
            - StripPrefix=1
        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/api/students/**
          filters:
            - StripPrefix=1
        - id: teacher-service
          uri: lb://teacher-service
          predicates:
            - Path=/api/teachers/**
          filters:
            - StripPrefix=1
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
        - id: college-admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/college-admin/**
          filters:
            - StripPrefix=1
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=1
        - id: counselor-service
          uri: lb://counselor-service
          predicates:
            - Path=/api/counselors/**
          filters:
            - StripPrefix=1
        - id: resource-service
          uri: lb://resource-service
          predicates:
            - Path=/api/resources/**
          filters:
            - StripPrefix=1
        - id: warning-service
          uri: lb://warning-service
          predicates:
            - Path=/api/warnings/**
          filters:
            - StripPrefix=1
        - id: message-service-ws
          uri: lb://message-service
          predicates:
            - Path=/ws/**

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG

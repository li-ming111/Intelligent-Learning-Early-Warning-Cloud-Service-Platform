spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        register-enabled: true
